<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>岗专关联图</title>
  <style>
    :root {
      --navy: #17346b;
      --text: #35527f;
      --muted: #6c84ab;
      --mint: #51D8BA;
      --sky: #77A2FF;
      --indigo: #8183FF;
      --violet: #BB7AFF;
      --gold: #F1D086;
      --line-sky: rgba(119, 162, 255, .34);
      --line-indigo: rgba(129, 131, 255, .28);
      --line-violet: rgba(187, 122, 255, .28);
      --line-mint: rgba(81, 216, 186, .32);
      --line-gold: rgba(241, 208, 134, .28);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      width: 3840px;
      height: 2160px;
      overflow: hidden;
      font-family: "PingFang SC", "HarmonyOS Sans SC", "Source Han Sans SC", "Microsoft YaHei", sans-serif;
      background:
        radial-gradient(circle at 8% 4%, rgba(133, 96, 255, .22), transparent 32%),
        radial-gradient(circle at 88% 10%, rgba(72, 191, 255, .20), transparent 31%),
        linear-gradient(135deg, #f5f4ff 0%, #f4fbff 44%, #f8fbff 100%);
      color: var(--text);
    }

    .page {
      width: 3840px;
      height: 2160px;
      padding: 72px 88px;
    }

    .panel {
      position: relative;
      width: 100%;
      height: 100%;
      border-radius: 36px;
      overflow: hidden;
      background:
        linear-gradient(180deg, rgba(255,255,255,.97), rgba(255,255,255,.92)),
        radial-gradient(circle at 45% 34%, rgba(122, 114, 255, .08), transparent 45%);
      border: 1px solid rgba(176, 197, 238, .72);
      box-shadow: 0 28px 80px rgba(44, 78, 140, .12), inset 0 1px 0 rgba(255,255,255,.9);
    }

    .glow {
      position: absolute;
      filter: blur(28px);
      opacity: .6;
      border-radius: 999px;
      pointer-events: none;
    }

    .glow.one { width: 620px; height: 280px; left: 1100px; top: 220px; background: rgba(129, 131, 255, .10); }
    .glow.two { width: 720px; height: 300px; right: 500px; bottom: 250px; background: rgba(81, 216, 186, .10); }

    .title {
      position: absolute;
      left: 50%;
      top: 28px;
      transform: translateX(-50%);
      font-size: 58px;
      line-height: 1;
      font-weight: 860;
      letter-spacing: 0;
      color: var(--navy);
    }

    .rule {
      position: absolute;
      left: 58px;
      right: 58px;
      top: 132px;
      height: 2px;
      background: linear-gradient(90deg, rgba(37, 87, 174, .18), rgba(77, 145, 255, .14), transparent);
    }

    .headers {
      position: absolute;
      left: 0;
      right: 0;
      top: 152px;
      height: 60px;
      color: var(--navy);
      font-size: 38px;
      font-weight: 800;
    }

    .header-item {
      position: absolute;
      top: 0;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 16px;
      white-space: nowrap;
    }

    .dot {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      flex: 0 0 auto;
      box-shadow: 0 0 0 7px rgba(58, 132, 255, .08);
    }

    .canvas {
      position: absolute;
      left: 58px;
      right: 58px;
      top: 240px;
      bottom: 58px;
    }

    .lines {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      overflow: visible;
      z-index: 1;
    }

    .lines path {
      fill: none;
      stroke-width: 3.1;
      stroke-linecap: round;
    }

    .node {
      position: absolute;
      z-index: 3;
      width: var(--w);
      height: var(--h);
      left: var(--x);
      top: var(--y);
      border-radius: 22px;
      background: linear-gradient(180deg, rgba(255,255,255,.98), rgba(250,253,255,.95));
      border: 2px solid color-mix(in srgb, var(--c) 58%, #ffffff);
      box-shadow: 0 14px 34px rgba(53, 91, 150, .08), inset 0 1px 0 rgba(255,255,255,.95);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: var(--navy);
    }

    .node::before, .node::after {
      content: "";
      position: absolute;
      top: 50%;
      width: 12px;
      height: 12px;
      margin-top: -6px;
      border-radius: 50%;
      background: #fff;
      border: 4px solid color-mix(in srgb, var(--c) 72%, #ffffff);
      box-shadow: 0 0 0 5px rgba(255,255,255,.75);
    }

    .node::before { left: -8px; }
    .node::after { right: -8px; }
    .node.no-left::before { display: none; }
    .node.no-right::after { display: none; }

    .inner {
      width: 100%;
      padding: 18px 18px;
      overflow: hidden;
    }

    .icon {
      width: 68px;
      height: 68px;
      margin: 0 auto 12px;
      border-radius: 18px;
      display: grid;
      place-items: center;
      color: #fff;
      font-size: 34px;
      font-weight: 900;
      background: linear-gradient(135deg, color-mix(in srgb, var(--c) 84%, #ffffff), color-mix(in srgb, var(--c) 94%, #7d62ff));
      box-shadow: 0 10px 24px color-mix(in srgb, var(--c) 20%, transparent);
    }

    .node h3 {
      margin: 0 0 8px;
      font-size: 26px;
      line-height: 1.25;
      font-weight: 840;
      letter-spacing: 0;
      color: var(--navy);
    }

    .node p {
      margin: 0;
      font-size: 18px;
      line-height: 1.48;
      font-weight: 560;
      color: #48618e;
    }

    .large .icon { width: 72px; height: 72px; font-size: 36px; }
    .large h3 { font-size: 25px; }
    .large p { font-size: 17px; line-height: 1.5; }

    .small .icon { width: 52px; height: 52px; font-size: 24px; margin-bottom: 10px; border-radius: 14px; }
    .small h3 { font-size: 22px; margin-bottom: 6px; }
    .small p { font-size: 15px; line-height: 1.42; }

    .course .inner {
      display: grid;
      grid-template-columns: 44px 1fr;
      align-items: center;
      gap: 16px;
      padding: 16px 20px;
    }

    .course .icon {
      margin: 0;
      width: 40px;
      height: 40px;
      font-size: 20px;
      border-radius: 12px;
    }

    .course h3 {
      margin: 0;
      text-align: left;
      font-size: 21px;
      line-height: 1.24;
    }

    .grad .inner { padding: 14px 16px; }
    .grad .icon {
      width: 44px;
      height: 44px;
      margin-bottom: 8px;
      border-radius: 13px;
      font-size: 22px;
    }
    .grad h3 { font-size: 23px; margin-bottom: 5px; }
    .grad p { font-size: 15px; line-height: 1.35; }

    .goal .icon {
      width: 88px;
      height: 88px;
      font-size: 44px;
      margin-bottom: 18px;
    }

    .goal h3 {
      font-size: 34px;
      line-height: 1.36;
    }

    .bridge {
      position: absolute;
      z-index: 4;
      left: 1685px;
      top: 470px;
      width: 165px;
      height: 360px;
      border-radius: 92px;
      border: 2px solid rgba(119, 162, 255, .26);
      background: linear-gradient(180deg, rgba(255,255,255,.96), rgba(245,251,255,.91));
      box-shadow: 0 18px 46px rgba(48, 105, 174, .08);
      display: grid;
      place-items: center;
      text-align: center;
      color: #417bdf;
      font-size: 31px;
      line-height: 1.26;
      font-weight: 860;
    }

    .bridge::before,
    .bridge::after {
      content: "";
      position: absolute;
      left: 50%;
      width: 2px;
      height: 250px;
      margin-left: -1px;
      background: repeating-linear-gradient(180deg, rgba(119, 162, 255, .34), rgba(119, 162, 255, .34) 14px, transparent 14px, transparent 28px);
    }

    .bridge::before { bottom: 100%; }
    .bridge::after { top: 100%; }

    .ring {
      position: absolute;
      z-index: 5;
      left: 1730px;
      width: 74px;
      height: 74px;
      border-radius: 50%;
      background: #fff;
      border: 8px solid rgba(119, 162, 255, .22);
      box-shadow: 0 0 0 8px rgba(255,255,255,.8), 0 12px 28px rgba(64, 126, 206, .11);
    }

    .ring::after {
      content: "";
      position: absolute;
      inset: 18px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--sky), var(--mint));
    }

    .ring.top { top: 345px; }
    .ring.bottom { top: 900px; }
  </style>
</head>

      const colorMap = {
        sky: "var(--line-sky)",
        indigo: "var(--line-indigo)",
        violet: "var(--line-violet)",
        mint: "var(--line-mint)",
        gold: "var(--line-gold)"
      };

      const columnMap = Object.fromEntries(columns.map(col => [col.id, col]));

      function nl(str) {
        return str ? str.replace(/\n/g, "<br>") : "";
      }

      function renderHeaders() {
        headers.innerHTML = columns.map(col => `
          <div class="header-item" style="left:${58 + col.x + col.width / 2}px">
            <i class="dot" style="background:${col.color}"></i>
            <span>${col.label}</span>
          </div>
        `).join("");
      }

      function renderNodes() {
        nodes.forEach(node => {
          const col = columnMap[node.col];
          const el = document.createElement("div");
          el.className = `node ${node.cls || ""}`.trim();
          el.id = node.id;
          el.style.setProperty("--x", `${col.x}px`);
          el.style.setProperty("--y", `${node.y}px`);
          el.style.setProperty("--w", `${col.width}px`);
          el.style.setProperty("--h", `${node.h}px`);
          el.style.setProperty("--c", node.c);
          el.innerHTML = `
            <div class="inner">
              ${node.icon ? `<div class="icon">${node.icon}</div>` : ""}
              <h3>${nl(node.title)}</h3>
              ${node.desc ? `<p>${nl(node.desc)}</p>` : ""}
            </div>
          `;
          canvas.appendChild(el);
        });
      }

      function resolve(id) {
        return document.getElementById(id);
      }

      function anchor(element, side) {
        const parent = canvas.getBoundingClientRect();
        const rect = element.getBoundingClientRect();
        const x = side === "right" ? rect.right - parent.left : rect.left - parent.left;
        return { x, y: rect.top - parent.top + rect.height / 2 };
      }

      function drawLinks() {
        const rect = canvas.getBoundingClientRect();
        svg.setAttribute("viewBox", `0 0 ${rect.width} ${rect.height}`);
        svg.replaceChildren();

        links.forEach(([fromId, toId, tone]) => {
          const from = resolve(fromId);
          const to = resolve(toId);
          if (!from || !to) return;

          const start = anchor(from, "right");
          const end = anchor(to, "left");
          const gap = Math.max(48, Math.min(150, Math.abs(end.x - start.x) * 0.38));
          const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
          path.setAttribute("d", `M ${start.x} ${start.y} C ${start.x + gap} ${start.y}, ${end.x - gap} ${end.y}, ${end.x} ${end.y}`);
          path.setAttribute("stroke", colorMap[tone]);
          svg.appendChild(path);
        });
      }

      renderHeaders();
      renderNodes();
      if (document.fonts && document.fonts.ready) {
        document.fonts.ready.then(drawLinks);
      } else {
        drawLinks();
      }
      window.addEventListener("resize", drawLinks);
    })();
  </script>
</body>
</html>
