            if (!fromNode || !toNode) return ''
            const fromRect = fromNode.getBoundingClientRect()
            const toRect = toNode.getBoundingClientRect()
            const fromX = fromRect.right - canvasRect.left
            const fromY = fromRect.top + fromRect.height / 2 - canvasRect.top
            const toX = toRect.left - canvasRect.left
            const toY = toRect.top + toRect.height / 2 - canvasRect.top
            return `<path class="graph-link" data-link-key="${link.key}" data-link-keys="${(link.keys || [link.fromKey, link.toKey]).join('|')}" d="${standaloneGraphLinePath(fromX, fromY, toX, toY, link.curve || 0)}"></path>`

                if (keys.includes(key)) keys.forEach((item) => activeKeys.add(item))
              })
              const activeLinkKeys = new Set(links
                .filter((link) => {
                  const keys = link.keys || [link.fromKey, link.toKey]
                  return keys.includes(key) || (activeKeys.has(link.fromKey) && activeKeys.has(link.toKey))
                })
                .map((link) => link.key))
              canvas.querySelectorAll('.graph-entity').forEach((item) => item.classList.toggle('active', activeKeys.has(item.dataset.graphKey)))

  <h2>一、专业建设背景与概述</h2>
  <h3>1.1 背景与目的</h3>
  <p>智能建造是建筑业数字化转型、工业化升级与绿色低碳发展交汇形成的复合型产业方向，也是当前职业教育专业调整中最具牵引力的领域之一。国家近年围绕数字住建、智能建造试点城市、装配式建筑、城市更新和工程质量安全数字监管等主题持续出台政策，明确要求建筑业由传统粗放式管理向数据驱动、平台协同、过程可追溯和运维可持续的模式转变。在这一背景下，智能建造工程专业不应仅被理解为传统土建专业的“软件升级版”，而应成为连接工程设计、施工组织、数字平台、智能设备和运维服务的综合型专业。</p>
  <p>本次调研的直接目的，是为智能建造工程专业的人才培养方案修订、课程体系重构、实训条件配置和校企合作拓展提供一份结构清晰、证据充分、便于落地的分析依据。报告聚焦专业对应行业、岗位、能力、专业建设现状、竞争态势与改进方向，力求回答三个核心问题：区域产业到底需要什么样的人才，当前专业建设距离岗位要求还有哪些差距，以及未来三年专业应优先补齐哪些关键能力与建设环节。</p>

  <h3>1.2 专业定位与特色</h3>
  <p>结合东北与华北区域建筑产业结构、学校服务面向和高职教育特点，智能建造工程专业的定位应落在“面向工程项目交付的一线复合型技术技能人才培养”上。其服务对象主要包括施工总包企业、数字建造平台服务商、装配式构件企业、智慧工地实施单位、结构监测机构、城市更新与智慧运维企业等。与普通建筑工程技术专业相比，智能建造工程专业更强调模型、数据、平台、设备和工程现场之间的协同关系；与纯软件类专业相比，它又必须建立在真实工程流程、施工组织、质量安全和项目成果交付之上。</p>
  <p>本专业的特色应体现在三个方面。第一，突出“项目链组织能力”，即让学生能够围绕一个工程项目完成信息采集、模型深化、平台配置、现场联调、数据判读和成果交付。第二，突出“平台与场景结合”，既掌握BIM、智慧工地、监测平台等中游能力，又理解装配式建造、智能施工、既有建筑更新和绿色运维等下游场景。第三，突出“证据化培养”，课程成果不是抽象分数，而是模型文件、联调记录、台账报表、监测图表、交付文档等可以被企业理解和评价的过程性成果。</p>

  <h3>1.3 调研内容与方法</h3>
  <p>本报告围绕区域产业、企业样本、招聘岗位、专业建设、同类专业和建设建议六类对象展开调研。数据来源包括智能建造产业链梳理资料、区域企业样本库、岗位招聘信息、学校现有人才培养方案、区域专业布点信息以及公开政策文件。方法上采用“产业链分析 + 岗位任务拆解 + 能力要素归纳 + 专业适配研判 + 标杆对比”的组合路径，以保证结论既有行业逻辑，也有职业教育落地性。</p>
  <p>在研究步骤上，首先通过产业链图谱识别专业应重点对接的中游服务环节和下游应用场景；其次通过岗位画像、岗位需求趋势和能力图谱提炼就业岗位群及其能力结构；再次对照专业已有课程、项目和实践条件评估支撑度；最后结合区域同类专业布点与标杆院校特征，形成差异化发展与改进建议。报告坚持“问题导向、证据导向、建设导向”三项原则，避免只停留在宏观口号或概念罗列层面。</p>

  <h2>二、专业对应行业与岗位需求分析</h2>
  <h3>2.1 核心就业行业分析</h3>
  <h4>2.1.1 行业分布现状</h4>
  <p>智能建造工程专业对应的核心就业行业，主要分布在施工总承包、工程咨询与设计、建筑数字化平台服务、装配式建筑生产、智能检测监测、城市更新与智慧运维等六类板块。从区域来看，东北地区的价值在于真实工程场景集中，尤其是老旧城区更新、工业厂房改造、寒区建筑施工和基础设施维护任务较多；华北地区则聚集了更多平台软件企业、设计咨询机构、央企总包资源和示范项目，是专业获取行业标准、平台逻辑和先进案例的重要来源。</p>

  <p>从样本结构看，北京、天津、雄安更偏向平台服务、设计咨询和大型总包项目，沈阳、大连则更适合承接装配式深化、智慧工地、工业建筑数字化和城市更新类任务。长春、哈尔滨在寒区建造、工业基础设施和既有建筑改造方面也提供了较好的案例来源。这意味着专业建设不宜简单按省份统计企业数量，而要根据企业所处环节和岗位转化价值进行分类对接。</p>

  <h4>2.1.2 行业发展现状与趋势</h4>
  <p>当前智能建造行业已经由“示范项目展示阶段”进入“平台落地与工程交付深化阶段”。BIM协同、智慧工地、数字孪生工地、装配式深化、结构健康监测和绿色低碳运维，正在从单项能力逐步发展为工程全流程协同体系。行业发展不再以单一软件应用为主要特征，而是以数据可追溯、平台可配置、现场可联动、成果可交付为标志。对职业教育来说，这意味着人才培养不能只围绕某一软件界面教学，而应围绕“业务目标 - 数据采集 - 模型处理 - 平台协同 - 现场应用 - 成果输出”组织完整的学习链路。</p>

  <p>从趋势判断看，未来三年行业将持续强化三类能力。其一是工程数据治理能力，包括模型数据一致性、现场数据采集规范、文档交付标准和平台流程配置；其二是项目实施能力，包括需求调研、部署联调、结果校核和跨团队协同；其三是场景交付能力，包括智能检测、施工管理、运维优化和质量安全预警。专业如果能够围绕这三类能力组织课程与实训，将比单纯增加“前沿概念课程”更具建设成效。</p>

  <h4>2.1.3 行业人才需求评估</h4>
  <p>从招聘信息和企业访谈样本看，行业对智能建造人才的需求已经从“会工具”转向“会交付”。企业在岗位说明中高频提及的关键词包括BIM深化、平台实施、数据治理、现场联调、质量安全、结构监测、成果汇报和客户协同。需求最旺盛的企业类型集中在工程总包、数字建造平台服务商、装配式企业和检测监测机构。就职业教育口径而言，这类企业的共同要求不是学生必须精通全部技术，而是能在工程流程中承担明确角色，并在规定周期内交付合格成果。</p>

  <h3>2.2 社会需求分布特征分析</h3>
  <h4>2.2.1 社会需求的单位性质特征</h4>
  <p>社会需求从单位性质上看，国有大中型工程企业对人才的岗位规范、文档交付和安全质量意识要求更高，适合承接专业群的“标准引领型”任务；民营平台服务商和工程数字化企业更强调实施效率、客户沟通和系统上线能力，适合转化为“项目驱动型”任务；地方检测机构、运维服务公司和装配式生产企业则偏重现场执行、数据采集和应用落地，更适合设计短周期、结果明确的实训模块。</p>
  <p>这说明专业建设不宜仅围绕某一类企业进行闭门设计，而应根据单位性质差异，把课程项目分成标准执行类、平台实施类、现场应用类三种类型。这样既能覆盖大型企业对规范意识和交付质量的要求，也能覆盖成长型企业对效率、灵活性和多岗位协作能力的需求。</p>

  <h4>2.2.2 社会需求的公司规模特征</h4>
  <p>从公司规模看，大型企业的招聘需求通常围绕项目流程细分岗位展开，如BIM深化、平台实施、监测分析、项目资料、设备联调等；中小企业则更倾向于招聘“一专多能”的复合型人才，希望毕业生既懂平台工具，又能下现场、会写文档、能与客户沟通。因此，智能建造工程专业的人才培养不能只做“大企业定制”，还要让学生具备进入中型服务公司和成长型工程企业的适应能力。</p>
  <p>从教学转化角度看，大型企业更适合作为标准案例、示范项目和毕业设计来源，中小企业更适合作为课程任务、实训案例和岗位训练场景来源。专业可以利用这种差异，把不同规模企业的需求拆分为不同层次的人才培养目标，从而形成更加完整的岗位适配面。</p>

  <h3>2.3 目标就业岗位分析</h3>
  <h4>2.3.1 核心岗位群识别</h4>
  <p>根据行业链条和招聘样本，智能建造工程专业重点对应六类核心岗位群：一是BIM深化设计与模型协同岗位；二是智慧工地平台实施与项目数据岗位；三是装配式建造与生产协同岗位；四是智能检测、结构监测与质量分析岗位；五是建筑机器人、智能装备与现场联动作业岗位；六是建筑智能运维与绿色低碳运营岗位。这六类岗位群覆盖了智能建造工程专业最适合承接的中游服务能力和下游场景交付能力。</p>

  <h4>2.3.2 岗位需求特征分析</h4>
  <p>岗位需求特征主要体现为复合性、项目性和结果导向性。复合性体现在岗位不仅要求掌握某一项工具，还要理解工程业务流程；项目性体现在工作常常围绕一个工程节点展开，需要在限定周期内完成任务；结果导向性体现在企业最终关心的是模型质量、平台配置效果、监测数据判断、交付文档完整性和现场协同结果。高职学生如果仅能停留在课堂内单项训练，将很难快速适应这种需求结构。</p>

  <h4>2.3.3 岗位需求趋势预测</h4>
  <p>岗位趋势上，BIM深化与智慧工地实施仍将是近三年的基本盘，但增长最快的方向将集中在项目数据治理、结构健康监测、智能运维和多平台协同岗位。随着更多工程企业把数字化平台从“展示工具”转为“日常生产工具”，相关岗位会从辅助角色转向项目交付团队的标准配置。对专业来说，越早把这些新型岗位中的共性任务沉淀成课程任务，就越容易在区域竞争中形成优势。</p>

  <h3>2.4 人才能力需求分析</h3>
  <h4>2.4.1 素质能力要求</h4>
  <p>企业对智能建造类岗位的素质能力要求主要集中在规范化执行、跨团队沟通、问题复盘、过程记录和服务意识五个方向。特别是在项目实施、平台交付和现场联调岗位中，企业更重视学生是否具备面对复杂现场条件时的责任意识与协同意识，而不只是能否完成单个技术动作。对于高职专业而言，这意味着素质能力不能仅停留在思政表述层面，而应通过项目例会、任务日志、交付文档、客户汇报和质量复盘等教学环节进行显性训练。</p>

  <h4>2.4.2 技术能力要求</h4>
  <p>技术能力要求主要分为建模与深化、平台配置与实施、数据采集与分析、现场设备与监测应用四类。建模与深化能力面向设计协同与装配式深化；平台实施能力面向智慧工地与工程软件部署；数据采集与分析能力面向监测、台账和质量追踪；现场应用能力则面向设备接入、施工组织和运维优化。智能建造工程专业的技术课程应围绕这些能力群组织，而不宜沿用纯理论分科或纯软件分科的方式。</p>

  <h4>2.4.3 工具能力要求</h4>
  <p>工具能力方面，行业高频涉及BIM建模软件、项目管理平台、监测与数据分析工具、物联网接入工具、运维台账系统和文档协同工具。值得注意的是，企业并不要求毕业生掌握所有品牌软件，而是更看重其是否理解工具在业务流程中的作用、能否快速迁移到新平台，以及能否用工具完成规范化成果输出。因此，学校在工具教学中应把“迁移能力”和“交付能力”作为核心评价点。</p>

  <h2>三、本专业建设现状分析</h2>
  <h3>3.1 专业基本情况</h3>
  <h4>3.1.1 专业概况</h4>
  <p>智能建造工程专业目前已经具备与建筑工程技术、建筑设备工程技术、工程造价等专业协同建设的基础，课程体系中已包含BIM应用、施工技术、工程管理、智能检测等相关内容，具有承接智能建造方向升级的可行性。从学校定位看，该专业既服务区域建筑产业升级，也承担专业群数字化转型的牵引功能，因此其建设成效不仅影响单一专业，更影响专业群整体的岗位适配能力。</p>

  <h4>3.1.2 培养方案与课程体系</h4>
  <p>现有培养方案已经覆盖建筑识图、工程结构、施工工艺、BIM基础、项目管理等基础模块，但在跨课程综合任务组织、中游平台实施训练、数据治理与标准化交付方面仍有进一步加强空间。课程体系中的优势在于传统工程基础较稳、实训逻辑较清晰；不足在于某些课程仍以单项软件训练或知识讲授为主，尚未完全形成围绕岗位任务链的综合训练模式。</p>

  <h3>3.2 人才培养成效</h3>
  <h4>3.2.1 就业质量</h4>
  <p>从区域用人反馈看，学生在施工组织、工程基础理解和常规BIM应用方面具备一定优势，能够较快进入施工现场辅助岗位、项目资料岗位和基础建模岗位。但在平台实施、跨系统联调、监测数据判断和客户沟通汇报等环节，仍需较长企业再培养周期。这表明专业的就业去向与行业发展方向总体一致，但高价值岗位的进入门槛仍需通过课程升级和项目训练进一步降低。</p>

  <h4>3.2.2 培养质量</h4>
  <p>在培养质量上，现有专业已经能够输出基本的模型、图纸、施工组织和工程资料成果，但对综合项目的过程化证据沉淀还不够系统。若能在课程体系中增加阶段评审、交付清单、现场问题复盘和跨课程项目汇总，学生的培养质量将更容易被企业识别，也更适合后续用于专业建设成果展示与质量诊改。</p>

  <h3>3.3 招生与生源分析</h3>
  <p>招生与生源方面，智能建造工程专业具备较强的“新工科”吸引力，但社会认知仍容易停留在“学BIM”或“学施工软件”的浅层印象。专业在招生宣传中应突出其就业面向广、岗位群覆盖多、数字化特征强、可衔接工程项目交付的优势，并结合东北与华北实际企业案例，让生源更清晰地理解专业价值。同时，应通过项目作品、实训环境、岗位图谱和校企协同案例提升专业辨识度。</p>

  <h2>四、专业竞争力与差异化分析</h2>
  <h3>4.1 同类专业布点情况</h3>
  <p>从区域内专业布点情况看，建筑工程技术、建筑智能化工程技术、工程造价等传统专业数量较多，而完整围绕“智能建造工程”进行系统建设的高职专业相对较少。多数院校虽然开设了BIM、智慧工地、装配式等相关课程，但真正将行业链、岗位链和课程链系统打通的专业并不多。这为学校塑造智能建造工程专业特色提供了窗口期。</p>

  <h3>4.2 竞争优势与劣势（SWOT）</h3>
  <p>从优势看，学校具备工程类专业基础、区域产业场景贴近、专业群协同条件较好，适合建设面向项目交付的智能建造专业。劣势主要在于高水平平台实施案例储备不足、企业导师和项目资源稳定性还需增强、课程间任务协同还不够紧密。机会在于区域城市更新、装配式推广、数字住建和智慧运维需求持续增长；风险则在于如果专业升级停留在概念层面，可能在人才培养成效上与传统专业拉不开差距。</p>

  <h3>4.3 标杆专业分析</h3>
  <p>对标高水平院校可以发现，标杆专业通常具有三个共同特征：一是围绕真实工程任务组织课程，而不是围绕软件模块组织课程；二是拥有可持续引入的企业案例和项目导师，能够形成年度更新机制；三是高度重视成果证据沉淀，使学生作品、实训记录、项目报告和岗位能力图谱可以直接支撑质量评价和成果展示。智能建造工程专业若要形成差异化竞争力，也应沿着这三条路径推进。</p>

  <h2>五、总结与专业建设改进建议</h2>
  <h3>5.1 综合分析结论</h3>
  <p>综合来看，智能建造工程专业最适合对接智能建造产业链中的中游平台服务环节和下游工程应用环节。区域产业对人才的真实需求，不是“会某一个软件”，而是“能围绕工程任务完成数据、模型、平台、设备和文档的协同交付”。学校现有专业基础能够支撑这一方向，但仍需要在课程结构、项目组织、实践条件和企业协同机制上做系统升级。</p>

  <h3>5.2 专业建设与优化建议</h3>
  <h4>5.2.1 课程体系优化建议</h4>
  <p>建议按照“基础认知层 - 岗位专项层 - 综合交付层”重构课程体系。基础认知层夯实工程结构、施工工艺、建筑识图、BIM基础和数据处理能力；岗位专项层聚焦智慧工地、装配式深化、智能检测、平台实施、建筑机器人与运维管理；综合交付层以企业案例为牵引，形成多门课程共同支撑的跨学期项目。</p>

  <h4>5.2.2 师资队伍建设建议</h4>
  <p>教师队伍建设应从“能授课”走向“能带项目”。除了原有工程基础教师外，还需重点培养具有平台实施经验、项目管理经验、监测数据分析经验和校企项目组织经验的教师骨干，逐步形成“课程教师 + 企业导师 + 项目负责人”协同机制。</p>

  <h4>5.2.3 实践教学强化建议</h4>
  <p>实践教学建议围绕BIM协同、智慧工地平台、装配式深化、智能检测监测、建筑机器人体验和智慧运维六类场景建设复合型实训环境。相比单点购置设备，更重要的是构建数据流、任务流和结果流，确保学生能够完成从采集到交付的完整训练。</p>

  <h4>5.2.4 招生与就业策略建议</h4>
  <p>招生宣传应突出智能建造工程专业的岗位覆盖面、工程数字化特征和区域产业链接优势，通过岗位图谱、企业项目案例、报告成果和学生作品集提升社会认知。就业方面，应建立“本地工程企业 + 区域平台服务商 + 标杆项目单位”的分层合作网络，增强就业对口率和岗位质量。</p>

  <h4>5.2.5 特色化发展路径建议</h4>
  <p>专业特色化路径可聚焦“寒区城市更新与智慧建造”“装配式与智慧工地协同交付”“建筑监测与运维数据应用”等方向，形成区别于普通土建专业和纯软件专业的明确画像。特色不在于概念新，而在于是否能长期沉淀项目案例、能力图谱和企业资源。</p>

  <h3>5.3 重点区域产教融合策略</h3>
  <p>建议以辽宁为主阵地，重点对接沈阳、大连的装配式、智慧工地和城市更新项目资源；以京津冀为外部参照，重点引入平台实施、BIM协同和大型工程总包案例；以东北城市更新场景为专业综合实训切入口，形成“本地训练 + 区域协同 + 标杆引领”的产教融合格局。中期可以建设区域企业案例库、岗位任务库和能力证据库，使调研结果真正转化为专业持续建设机制。</p>

              scrollY: 0,

            const pageWidth = pdf.internal.pageSize.getWidth()

            const marginX = 10
            const marginTop = 10
            const marginBottom = 12
            const usableWidth = pageWidth - marginX * 2
            const usableHeight = pageHeight - marginTop - marginBottom
            const pageHeightPx = Math.floor((canvas.width * usableHeight) / usableWidth)
            let renderedHeight = 0
            let pageIndex = 0
            while (renderedHeight < canvas.height) {
              const sliceHeight = Math.min(pageHeightPx, canvas.height - renderedHeight)

              pageCanvas.height = sliceHeight

                canvas.width,
                sliceHeight,
                0,

                pageCanvas.height

          const uniqueJobIndustryRelations = new Set()
          const activeJobIndustryRelations = staticJobIndustryRelations
            .filter((relation) => activeJobIds.has(relation.jobId) && industryById.has(relation.industryNodeId))
            .filter((relation) => {
              const key = `${relation.industryNodeId}:${relation.jobId}`
              if (uniqueJobIndustryRelations.has(key)) return false
              uniqueJobIndustryRelations.add(key)
              return true
          })
          jobsForGraph.forEach((job) => {
            if (!activeJobIndustryRelations.some((relation) => relation.jobId === job.id) && industryById.has(job.industryNodeId)) {
              activeJobIndustryRelations.push({ industryNodeId: job.industryNodeId, jobId: job.id })
            }
          })
          const activeIndustryIds = new Set(activeJobIndustryRelations.map((relation) => relation.industryNodeId))
          const uniqueChainIndustryRelations = new Set()
          const activeIndustryChainRelations = staticIndustryChainRelations
            .filter((relation) => activeIndustryIds.has(relation.industryNodeId) && chainById.has(relation.chainId))
            .filter((relation) => {
              const key = `${relation.chainId}:${relation.industryNodeId}`
              if (uniqueChainIndustryRelations.has(key)) return false
              uniqueChainIndustryRelations.add(key)
              return true
            })
          activeIndustryIds.forEach((industryId) => {
            if (activeIndustryChainRelations.some((relation) => relation.industryNodeId === industryId)) return
            const industry = industryById.get(industryId)
            if (industry && chainById.has(industry.chainId)) {
              activeIndustryChainRelations.push({ chainId: industry.chainId, industryNodeId: industry.id })
            }
          })
          const activeChainIds = new Set(activeIndustryChainRelations.map((relation) => relation.chainId))
          const relatedIndustryIdsForJob = (jobId) => activeJobIndustryRelations
            .filter((relation) => relation.jobId === jobId)
            .map((relation) => relation.industryNodeId)
          const relatedChainIdsForIndustry = (industryNodeId) => activeIndustryChainRelations
            .filter((relation) => relation.industryNodeId === industryNodeId)
            .map((relation) => relation.chainId)
          const relatedChainIdsForJob = (jobId) => Array.from(new Set(
            relatedIndustryIdsForJob(jobId).flatMap((industryId) => relatedChainIdsForIndustry(industryId))
          ))
          const topForIndex = (index, total, start = 7, end = 93) => total <= 1 ? 50 : start + (index / (total - 1)) * (end - start)
          const industryOrderForJob = (job) => {
            const indexes = relatedIndustryIdsForJob(job.id).map((industryId) => industryOrder.get(industryId) ?? Number.MAX_SAFE_INTEGER)
            return indexes.length ? Math.min(...indexes) : Number.MAX_SAFE_INTEGER
          }
          const chains = staticChains
            .filter((chain) => activeChainIds.has(chain.id))
            .map((chain, index, list) => ({ ...chain, top: topForIndex(index, list.length, 12, 88) }))
          const industries = staticIndustries
            .filter((industry) => activeIndustryIds.has(industry.id))
            .map((industry, index, list) => ({ ...industry, top: topForIndex(index, list.length, 8, 92) }))
          const orderedJobs = [...jobsForGraph]
            .sort((a, b) => {
              const industryDiff = industryOrderForJob(a) - industryOrderForJob(b)
              if (industryDiff !== 0) return industryDiff
              return (originalJobOrder.get(a.id) ?? 0) - (originalJobOrder.get(b.id) ?? 0)
            })
            .map((job, index, list) => ({ ...job, row: index, top: topForIndex(index, list.length, 6, 94) }))
          const groupedJobs = Array.from(
            orderedJobs.reduce((groups, job) => {
              const currentGroup = groups.get(job.groupName)
              if (currentGroup) {
                currentGroup.jobs.push(job)
              } else {
                groups.set(job.groupName, { name: job.groupName, jobs: [job] })
              }
              return groups
            }, new Map()).values()
          )
          const graphGroupTones = ['cyan', 'violet', 'teal', 'indigo', 'amber', 'blue']
          const graphCanvasHeight = 1440
          const groupGapPx = 26
          const groupShellHeightPx = 72
          const groupJobHeightPx = 56
          const groupJobGapPx = 10
          const desiredGroupHeights = groupedJobs.map(
            (group) => groupShellHeightPx + group.jobs.length * groupJobHeightPx + Math.max(group.jobs.length - 1, 0) * groupJobGapPx
          )
          const totalDesiredHeight =
            desiredGroupHeights.reduce((sum, height) => sum + height, 0) + Math.max(groupedJobs.length - 1, 0) * groupGapPx
          const effectiveCanvasHeight = Math.max(graphCanvasHeight, Math.ceil(totalDesiredHeight / 0.88))
          const groupStartPx = effectiveCanvasHeight * 0.06
          const groupAvailablePx = effectiveCanvasHeight * 0.88
          const groupScale = totalDesiredHeight > groupAvailablePx ? groupAvailablePx / totalDesiredHeight : 1
          let groupCursorPx = groupStartPx
          const jobGroups = groupedJobs.map((group, index) => {
            const heightPx = desiredGroupHeights[index] * groupScale
            const result = {
              key: `job-group:${group.name}:${index}`,
              name: group.name,
              count: group.jobs.length,
              top: (groupCursorPx / effectiveCanvasHeight) * 100,
              height: (heightPx / effectiveCanvasHeight) * 100,
              tone: graphGroupTones[index % graphGroupTones.length],
              jobs: group.jobs
            }
            groupCursorPx += heightPx + (groupedJobs.length === 1 ? 0 : groupGapPx * groupScale)
            return result
          })
          const count = orderedJobs.length
          const jobRow = new Map(orderedJobs.map((job) => [job.id, job.row]))
          const activeCourses = staticCourses.map((course) => ({
            ...course,
            jobIds: jobsForGraph.filter((job) => getCourseIds(job.id).includes(course.id)).map((job) => job.id)
          })).filter((course) => course.jobIds.length > 0)
          const courses = activeCourses.map((course) => {
            const rows = course.jobIds.map((id) => jobRow.get(id)).filter((value) => value !== undefined)
            return { ...course, avg: rows.reduce((sum, item) => sum + item, 0) / rows.length }
          }).filter((course) => Number.isFinite(course.avg)).sort((a, b) => a.avg - b.avg).map((course, index, list) => ({ ...course, top: list.length === 1 ? 50 : 9 + (index / (list.length - 1)) * 82 }))
          syncStaticGraphChrome(canvas, 'industry', {
            chainCount: chains.length || staticChains.length,
            industryCount: industries.length || staticIndustries.length,
            groupCount: jobGroups.length,
            jobCount: orderedJobs.length,
            courseCount: courses.length
          })
          const links = []
          activeIndustryChainRelations.forEach((relation) => {
            links.push({
              key: `chain-industry-${relation.chainId}-${relation.industryNodeId}`,
              fromKey: `chain:${relation.chainId}`,
              toKey: `industry:${relation.industryNodeId}`,
              keys: [`chain:${relation.chainId}`, `industry:${relation.industryNodeId}`]
            })
          })
          activeJobIndustryRelations.forEach((relation) => {
            links.push({
              key: `industry-job-${relation.industryNodeId}-${relation.jobId}`,
              fromKey: `industry:${relation.industryNodeId}`,
              toKey: `job:${relation.jobId}`,
              keys: [
                `industry:${relation.industryNodeId}`,
                `job:${relation.jobId}`,
                ...relatedChainIdsForIndustry(relation.industryNodeId).map((chainId) => `chain:${chainId}`)
              ]
            })
          })
          courses.forEach((course) => {
            course.jobIds.forEach((jobId, index) => {
              const job = orderedJobs.find((item) => item.id === jobId)
              if (!job) return
              const industryKeys = relatedIndustryIdsForJob(job.id).map((industryId) => `industry:${industryId}`)
              const chainKeys = relatedChainIdsForJob(job.id).map((chainId) => `chain:${chainId}`)
              links.push({
                key: `job-course-${jobId}-${course.id}`,
                fromKey: `job:${jobId}`,
                toKey: `course:${course.id}`,
                keys: [`job:${jobId}`, `course:${course.id}`, ...industryKeys, ...chainKeys],
                bend: index % 2 === 0 ? 4 : -4
              })
            })
          })
          canvas.style.height = `${effectiveCanvasHeight}px`
          const linkHtml = `<svg class="graph-lines" viewBox="0 0 1 1" preserveAspectRatio="none" aria-hidden="true"></svg>`
          const chainHtml = chains.map((chain) => `<button class="graph-entity chain-node" data-graph-key="chain:${chain.id}" style="left:2%;width:20%;top:${chain.top}%"><span>${chain.name}</span></button>`).join('')
          const industryHtml = industries.map((industry) => `<button class="graph-entity industry-node" data-graph-key="industry:${industry.id}" style="left:26%;width:21%;top:${industry.top}%"><span>${industry.name}</span></button>`).join('')
          const groupHtml = `<div class="graph-job-groups">${jobGroups.map((group) => `<div class="graph-job-group group-accent-${group.tone}" style="left:51%;width:29%;top:${group.top}%;height:${group.height}%"><div class="graph-job-group-header"><span class="graph-job-group-title">${group.name}</span><em>${group.count}个岗位</em></div><div class="graph-job-group-jobs">${group.jobs.map((job) => `<button class="graph-entity job-node graph-group-job" data-graph-key="job:${job.id}" data-graph-job="${job.id}"><span>${job.name}</span></button>`).join('')}</div></div>`).join('')}</div>`
