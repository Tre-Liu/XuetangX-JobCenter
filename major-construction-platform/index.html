            const fromRect = fromNode.getBoundingClientRect()
            const toRect = toNode.getBoundingClientRect()
            const fromX = fromRect.right - canvasRect.left
            const fromY = fromRect.top + fromRect.height / 2 - canvasRect.top

            return `<path class="graph-link" data-link-key="${link.key}" data-link-keys="${(link.keys || [link.fromKey, link.toKey]).join('|')}" d="${standaloneGraphLinePath(fromX, fromY, toX, toY, link.curve || 0)}"></path>`

  <h2>一、专业建设背景与概述</h2>
  <h3>1.1 背景与目的</h3>
  <p>智能建造是建筑业数字化转型、工业化升级与绿色低碳发展交汇形成的复合型产业方向，也是当前职业教育专业调整中最具牵引力的领域之一。国家近年围绕数字住建、智能建造试点城市、装配式建筑、城市更新和工程质量安全数字监管等主题持续出台政策，明确要求建筑业由传统粗放式管理向数据驱动、平台协同、过程可追溯和运维可持续的模式转变。在这一背景下，智能建造工程专业不应仅被理解为传统土建专业的“软件升级版”，而应成为连接工程设计、施工组织、数字平台、智能设备和运维服务的综合型专业。</p>
  <p>本次调研的直接目的，是为智能建造工程专业的人才培养方案修订、课程体系重构、实训条件配置和校企合作拓展提供一份结构清晰、证据充分、便于落地的分析依据。报告聚焦专业对应行业、岗位、能力、专业建设现状、竞争态势与改进方向，力求回答三个核心问题：区域产业到底需要什么样的人才，当前专业建设距离岗位要求还有哪些差距，以及未来三年专业应优先补齐哪些关键能力与建设环节。</p>

  <h3>1.2 专业定位与特色</h3>
  <p>结合东北与华北区域建筑产业结构、学校服务面向和高职教育特点，智能建造工程专业的定位应落在“面向工程项目交付的一线复合型技术技能人才培养”上。其服务对象主要包括施工总包企业、数字建造平台服务商、装配式构件企业、智慧工地实施单位、结构监测机构、城市更新与智慧运维企业等。与普通建筑工程技术专业相比，智能建造工程专业更强调模型、数据、平台、设备和工程现场之间的协同关系；与纯软件类专业相比，它又必须建立在真实工程流程、施工组织、质量安全和项目成果交付之上。</p>
  <p>本专业的特色应体现在三个方面。第一，突出“项目链组织能力”，即让学生能够围绕一个工程项目完成信息采集、模型深化、平台配置、现场联调、数据判读和成果交付。第二，突出“平台与场景结合”，既掌握BIM、智慧工地、监测平台等中游能力，又理解装配式建造、智能施工、既有建筑更新和绿色运维等下游场景。第三，突出“证据化培养”，课程成果不是抽象分数，而是模型文件、联调记录、台账报表、监测图表、交付文档等可以被企业理解和评价的过程性成果。</p>

  <h3>1.3 调研内容与方法</h3>
  <p>本报告围绕区域产业、企业样本、招聘岗位、专业建设、同类专业和建设建议六类对象展开调研。数据来源包括智能建造产业链梳理资料、区域企业样本库、岗位招聘信息、学校现有人才培养方案、区域专业布点信息以及公开政策文件。方法上采用“产业链分析 + 岗位任务拆解 + 能力要素归纳 + 专业适配研判 + 标杆对比”的组合路径，以保证结论既有行业逻辑，也有职业教育落地性。</p>
  <p>在研究步骤上，首先通过产业链图谱识别专业应重点对接的中游服务环节和下游应用场景；其次通过岗位画像、岗位需求趋势和能力图谱提炼就业岗位群及其能力结构；再次对照专业已有课程、项目和实践条件评估支撑度；最后结合区域同类专业布点与标杆院校特征，形成差异化发展与改进建议。报告坚持“问题导向、证据导向、建设导向”三项原则，避免只停留在宏观口号或概念罗列层面。</p>

  <h2>二、专业对应行业与岗位需求分析</h2>
  <h3>2.1 核心就业行业分析</h3>
  <h4>2.1.1 行业分布现状</h4>
  <p>智能建造工程专业对应的核心就业行业，主要分布在施工总承包、工程咨询与设计、建筑数字化平台服务、装配式建筑生产、智能检测监测、城市更新与智慧运维等六类板块。从区域来看，东北地区的价值在于真实工程场景集中，尤其是老旧城区更新、工业厂房改造、寒区建筑施工和基础设施维护任务较多；华北地区则聚集了更多平台软件企业、设计咨询机构、央企总包资源和示范项目，是专业获取行业标准、平台逻辑和先进案例的重要来源。</p>

  <h4>2.1.2 行业发展现状与趋势</h4>
  <p>当前智能建造行业已经由“示范项目展示阶段”进入“平台落地与工程交付深化阶段”。BIM协同、智慧工地、数字孪生工地、装配式深化、结构健康监测和绿色低碳运维，正在从单项能力逐步发展为工程全流程协同体系。行业发展不再以单一软件应用为主要特征，而是以数据可追溯、平台可配置、现场可联动、成果可交付为标志。对职业教育来说，这意味着人才培养不能只围绕某一软件界面教学，而应围绕“业务目标 - 数据采集 - 模型处理 - 平台协同 - 现场应用 - 成果输出”组织完整的学习链路。</p>

  <h4>2.1.3 行业人才需求评估</h4>
  <p>从招聘信息和企业访谈样本看，行业对智能建造人才的需求已经从“会工具”转向“会交付”。企业在岗位说明中高频提及的关键词包括BIM深化、平台实施、数据治理、现场联调、质量安全、结构监测、成果汇报和客户协同。需求最旺盛的企业类型集中在工程总包、数字建造平台服务商、装配式企业和检测监测机构。就职业教育口径而言，这类企业的共同要求不是学生必须精通全部技术，而是能在工程流程中承担明确角色，并在规定周期内交付合格成果。</p>

  <h3>2.2 社会需求分布特征分析</h3>
  <h4>2.2.1 社会需求的单位性质特征</h4>
  <p>社会需求从单位性质上看，国有大中型工程企业对人才的岗位规范、文档交付和安全质量意识要求更高，适合承接专业群的“标准引领型”任务；民营平台服务商和工程数字化企业更强调实施效率、客户沟通和系统上线能力，适合转化为“项目驱动型”任务；地方检测机构、运维服务公司和装配式生产企业则偏重现场执行、数据采集和应用落地，更适合设计短周期、结果明确的实训模块。</p>
  <p>这说明专业建设不宜仅围绕某一类企业进行闭门设计，而应根据单位性质差异，把课程项目分成标准执行类、平台实施类、现场应用类三种类型。这样既能覆盖大型企业对规范意识和交付质量的要求，也能覆盖成长型企业对效率、灵活性和多岗位协作能力的需求。</p>

  <h4>2.2.2 社会需求的公司规模特征</h4>
  <p>从公司规模看，大型企业的招聘需求通常围绕项目流程细分岗位展开，如BIM深化、平台实施、监测分析、项目资料、设备联调等；中小企业则更倾向于招聘“一专多能”的复合型人才，希望毕业生既懂平台工具，又能下现场、会写文档、能与客户沟通。因此，智能建造工程专业的人才培养不能只做“大企业定制”，还要让学生具备进入中型服务公司和成长型工程企业的适应能力。</p>
  <p>从教学转化角度看，大型企业更适合作为标准案例、示范项目和毕业设计来源，中小企业更适合作为课程任务、实训案例和岗位训练场景来源。专业可以利用这种差异，把不同规模企业的需求拆分为不同层次的人才培养目标，从而形成更加完整的岗位适配面。</p>

  <h3>2.3 目标就业岗位分析</h3>
  <h4>2.3.1 核心岗位群识别</h4>
  <p>根据行业链条和招聘样本，智能建造工程专业重点对应六类核心岗位群：一是BIM深化设计与模型协同岗位；二是智慧工地平台实施与项目数据岗位；三是装配式建造与生产协同岗位；四是智能检测、结构监测与质量分析岗位；五是建筑机器人、智能装备与现场联动作业岗位；六是建筑智能运维与绿色低碳运营岗位。这六类岗位群覆盖了智能建造工程专业最适合承接的中游服务能力和下游场景交付能力。</p>

  <h4>2.3.2 岗位需求特征分析</h4>
  <p>岗位需求特征主要体现为复合性、项目性和结果导向性。复合性体现在岗位不仅要求掌握某一项工具，还要理解工程业务流程；项目性体现在工作常常围绕一个工程节点展开，需要在限定周期内完成任务；结果导向性体现在企业最终关心的是模型质量、平台配置效果、监测数据判断、交付文档完整性和现场协同结果。高职学生如果仅能停留在课堂内单项训练，将很难快速适应这种需求结构。</p>

  <h4>2.3.3 岗位需求趋势预测</h4>
  <p>岗位趋势上，BIM深化与智慧工地实施仍将是近三年的基本盘，但增长最快的方向将集中在项目数据治理、结构健康监测、智能运维和多平台协同岗位。随着更多工程企业把数字化平台从“展示工具”转为“日常生产工具”，相关岗位会从辅助角色转向项目交付团队的标准配置。对专业来说，越早把这些新型岗位中的共性任务沉淀成课程任务，就越容易在区域竞争中形成优势。</p>

  <h3>2.4 人才能力需求分析</h3>
  <h4>2.4.1 素质能力要求</h4>
  <p>企业对智能建造类岗位的素质能力要求主要集中在规范化执行、跨团队沟通、问题复盘、过程记录和服务意识五个方向。特别是在项目实施、平台交付和现场联调岗位中，企业更重视学生是否具备面对复杂现场条件时的责任意识与协同意识，而不只是能否完成单个技术动作。对于高职专业而言，这意味着素质能力不能仅停留在思政表述层面，而应通过项目例会、任务日志、交付文档、客户汇报和质量复盘等教学环节进行显性训练。</p>

  <h4>2.4.2 技术能力要求</h4>
  <p>技术能力要求主要分为建模与深化、平台配置与实施、数据采集与分析、现场设备与监测应用四类。建模与深化能力面向设计协同与装配式深化；平台实施能力面向智慧工地与工程软件部署；数据采集与分析能力面向监测、台账和质量追踪；现场应用能力则面向设备接入、施工组织和运维优化。智能建造工程专业的技术课程应围绕这些能力群组织，而不宜沿用纯理论分科或纯软件分科的方式。</p>

  <h4>2.4.3 工具能力要求</h4>
  <p>工具能力方面，行业高频涉及BIM建模软件、项目管理平台、监测与数据分析工具、物联网接入工具、运维台账系统和文档协同工具。值得注意的是，企业并不要求毕业生掌握所有品牌软件，而是更看重其是否理解工具在业务流程中的作用、能否快速迁移到新平台，以及能否用工具完成规范化成果输出。因此，学校在工具教学中应把“迁移能力”和“交付能力”作为核心评价点。</p>

  <h2>三、本专业建设现状分析</h2>
  <h3>3.1 专业基本情况</h3>
  <h4>3.1.1 专业概况</h4>
  <p>智能建造工程专业目前已经具备与建筑工程技术、建筑设备工程技术、工程造价等专业协同建设的基础，课程体系中已包含BIM应用、施工技术、工程管理、智能检测等相关内容，具有承接智能建造方向升级的可行性。从学校定位看，该专业既服务区域建筑产业升级，也承担专业群数字化转型的牵引功能，因此其建设成效不仅影响单一专业，更影响专业群整体的岗位适配能力。</p>

  <h4>3.1.2 培养方案与课程体系</h4>
  <p>现有培养方案已经覆盖建筑识图、工程结构、施工工艺、BIM基础、项目管理等基础模块，但在跨课程综合任务组织、中游平台实施训练、数据治理与标准化交付方面仍有进一步加强空间。课程体系中的优势在于传统工程基础较稳、实训逻辑较清晰；不足在于某些课程仍以单项软件训练或知识讲授为主，尚未完全形成围绕岗位任务链的综合训练模式。</p>

  <h3>3.2 人才培养成效</h3>
  <h4>3.2.1 就业质量</h4>
  <p>从区域用人反馈看，学生在施工组织、工程基础理解和常规BIM应用方面具备一定优势，能够较快进入施工现场辅助岗位、项目资料岗位和基础建模岗位。但在平台实施、跨系统联调、监测数据判断和客户沟通汇报等环节，仍需较长企业再培养周期。这表明专业的就业去向与行业发展方向总体一致，但高价值岗位的进入门槛仍需通过课程升级和项目训练进一步降低。</p>

  <h4>3.2.2 培养质量</h4>
  <p>在培养质量上，现有专业已经能够输出基本的模型、图纸、施工组织和工程资料成果，但对综合项目的过程化证据沉淀还不够系统。若能在课程体系中增加阶段评审、交付清单、现场问题复盘和跨课程项目汇总，学生的培养质量将更容易被企业识别，也更适合后续用于专业建设成果展示与质量诊改。</p>

  <h3>3.3 招生与生源分析</h3>
  <p>招生与生源方面，智能建造工程专业具备较强的“新工科”吸引力，但社会认知仍容易停留在“学BIM”或“学施工软件”的浅层印象。专业在招生宣传中应突出其就业面向广、岗位群覆盖多、数字化特征强、可衔接工程项目交付的优势，并结合东北与华北实际企业案例，让生源更清晰地理解专业价值。同时，应通过项目作品、实训环境、岗位图谱和校企协同案例提升专业辨识度。</p>

  <h2>四、专业竞争力与差异化分析</h2>
  <h3>4.1 同类专业布点情况</h3>
  <p>从区域内专业布点情况看，建筑工程技术、建筑智能化工程技术、工程造价等传统专业数量较多，而完整围绕“智能建造工程”进行系统建设的高职专业相对较少。多数院校虽然开设了BIM、智慧工地、装配式等相关课程，但真正将行业链、岗位链和课程链系统打通的专业并不多。这为学校塑造智能建造工程专业特色提供了窗口期。</p>

  <h3>4.2 竞争优势与劣势（SWOT）</h3>
  <p>从优势看，学校具备工程类专业基础、区域产业场景贴近、专业群协同条件较好，适合建设面向项目交付的智能建造专业。劣势主要在于高水平平台实施案例储备不足、企业导师和项目资源稳定性还需增强、课程间任务协同还不够紧密。机会在于区域城市更新、装配式推广、数字住建和智慧运维需求持续增长；风险则在于如果专业升级停留在概念层面，可能在人才培养成效上与传统专业拉不开差距。</p>

  <h3>4.3 标杆专业分析</h3>
  <p>对标高水平院校可以发现，标杆专业通常具有三个共同特征：一是围绕真实工程任务组织课程，而不是围绕软件模块组织课程；二是拥有可持续引入的企业案例和项目导师，能够形成年度更新机制；三是高度重视成果证据沉淀，使学生作品、实训记录、项目报告和岗位能力图谱可以直接支撑质量评价和成果展示。智能建造工程专业若要形成差异化竞争力，也应沿着这三条路径推进。</p>

  <h2>五、总结与专业建设改进建议</h2>
  <h3>5.1 综合分析结论</h3>
  <p>综合来看，智能建造工程专业最适合对接智能建造产业链中的中游平台服务环节和下游工程应用环节。区域产业对人才的真实需求，不是“会某一个软件”，而是“能围绕工程任务完成数据、模型、平台、设备和文档的协同交付”。学校现有专业基础能够支撑这一方向，但仍需要在课程结构、项目组织、实践条件和企业协同机制上做系统升级。</p>

  <h3>5.2 专业建设与优化建议</h3>
  <h4>5.2.1 课程体系优化建议</h4>
  <p>建议按照“基础认知层 - 岗位专项层 - 综合交付层”重构课程体系。基础认知层夯实工程结构、施工工艺、建筑识图、BIM基础和数据处理能力；岗位专项层聚焦智慧工地、装配式深化、智能检测、平台实施、建筑机器人与运维管理；综合交付层以企业案例为牵引，形成多门课程共同支撑的跨学期项目。</p>

  <h4>5.2.2 师资队伍建设建议</h4>
  <p>教师队伍建设应从“能授课”走向“能带项目”。除了原有工程基础教师外，还需重点培养具有平台实施经验、项目管理经验、监测数据分析经验和校企项目组织经验的教师骨干，逐步形成“课程教师 + 企业导师 + 项目负责人”协同机制。</p>

  <h4>5.2.3 实践教学强化建议</h4>
  <p>实践教学建议围绕BIM协同、智慧工地平台、装配式深化、智能检测监测、建筑机器人体验和智慧运维六类场景建设复合型实训环境。相比单点购置设备，更重要的是构建数据流、任务流和结果流，确保学生能够完成从采集到交付的完整训练。</p>

  <h4>5.2.4 招生与就业策略建议</h4>
  <p>招生宣传应突出智能建造工程专业的岗位覆盖面、工程数字化特征和区域产业链接优势，通过岗位图谱、企业项目案例、报告成果和学生作品集提升社会认知。就业方面，应建立“本地工程企业 + 区域平台服务商 + 标杆项目单位”的分层合作网络，增强就业对口率和岗位质量。</p>

  <h4>5.2.5 特色化发展路径建议</h4>
  <p>专业特色化路径可聚焦“寒区城市更新与智慧建造”“装配式与智慧工地协同交付”“建筑监测与运维数据应用”等方向，形成区别于普通土建专业和纯软件专业的明确画像。特色不在于概念新，而在于是否能长期沉淀项目案例、能力图谱和企业资源。</p>

  <h3>5.3 重点区域产教融合策略</h3>
  <p>建议以辽宁为主阵地，重点对接沈阳、大连的装配式、智慧工地和城市更新项目资源；以京津冀为外部参照，重点引入平台实施、BIM协同和大型工程总包案例；以东北城市更新场景为专业综合实训切入口，形成“本地训练 + 区域协同 + 标杆引领”的产教融合格局。中期可以建设区域企业案例库、岗位任务库和能力证据库，使调研结果真正转化为专业持续建设机制。</p>

            const canvas = await window.html2canvas(exportDoc, {

              windowWidth: exportDoc.scrollWidth,

            })
            const pageWidth = pdf.internal.pageSize.getWidth()
            const pageHeight = pdf.internal.pageSize.getHeight()
            const marginX = 10
            const marginTop = 10
            const marginBottom = 12
            const usableWidth = pageWidth - marginX * 2
            const usableHeight = pageHeight - marginTop - marginBottom
            const pageHeightPx = Math.floor((canvas.width * usableHeight) / usableWidth)
            let renderedHeight = 0
            let pageIndex = 0
            while (renderedHeight < canvas.height) {
              const sliceHeight = Math.min(pageHeightPx, canvas.height - renderedHeight)
              const pageCanvas = document.createElement('canvas')
              pageCanvas.width = canvas.width
              pageCanvas.height = sliceHeight

              ctx.drawImage(

                0,
                renderedHeight,
                canvas.width,
                sliceHeight,
                0,
                0,

                pageCanvas.height

          if (!worksheet) {
            return { abilities: [], errors: ['未读取到工作表，请检查上传文件。'] }
          }
          const rows = XLSX.utils.sheet_to_json(worksheet, { header: 1, raw: false, defval: '' })
          const headerIndex = rows.findIndex((row) =>
            staticAbilityTemplateColumns.every((header, index) => String(row[index] || '').trim() === header)
          )
          if (headerIndex === -1) {
            return { abilities: [], errors: ['未找到模板表头，请使用“下载模板”生成的标准模板填写。'] }
          }

          rows.slice(headerIndex + 1).forEach((row, index) => {

              return

            abilities.push({
              name,
              category,
              definition: definition || defaultDefinition
            })

              card.hidden = keyword !== '' && !card.textContent.toLowerCase().includes(keyword)
            })
            return
          }
          if (target.matches('[data-course-ability-search]')) {
            const dialog = target.closest('.course-ability-dialog')
            if (!dialog) return
            const keyword = target.value.trim().toLowerCase()
            let firstVisibleJobId = ''
            dialog.querySelectorAll('[data-course-ability-job]').forEach((card) => {
              const visible = keyword === '' || card.textContent.toLowerCase().includes(keyword)
              card.hidden = !visible
              if (visible && !firstVisibleJobId) firstVisibleJobId = card.dataset.courseAbilityJob || ''
            })
            const selectedVisible = Array.from(dialog.querySelectorAll('[data-course-ability-job]'))
              .some((card) => !card.hidden && card.dataset.courseAbilityJob === staticCourseAbilityDialogState.selectedJobId)
            if (!selectedVisible) {
              staticCourseAbilityDialogState.selectedJobId = firstVisibleJobId
              loadStaticCourseAbilityDraft(staticCourseAbilityDialogState.nodeName, firstVisibleJobId)
              refreshStaticCourseAbilityDialog()
            }
            return
          }
          if (target.matches('[data-course-ability-checkbox]')) {
            const [category = '知识', abilityCode = ''] = (target.dataset.courseAbilityCheckbox || '').split('::')
            const ability = decodeURIComponent(abilityCode)
            const selected = new Set(staticCourseAbilityDialogState.draft[category] || [])
            if (target.checked) selected.add(ability)
            else selected.delete(ability)
            const nextDraft = {
              ...staticCourseAbilityDialogState.draft,
              [category]: Array.from(selected)
            }
            staticCourseAbilityDialogState.draft = nextDraft
            if (staticCourseAbilityDialogState.selectedJobId) {
              staticCourseAbilityDialogState.draftsByJob = {
                ...staticCourseAbilityDialogState.draftsByJob,
                [staticCourseAbilityDialogState.selectedJobId]: cloneStaticCourseAbilityMap(nextDraft)
              }
            }
            refreshStaticCourseAbilityDialog()
            return
          }
          if (target.matches('[data-report-search]')) {
            staticReportSearch = target.value
            renderReport('library')
            const search = app.querySelector('[data-report-search]')
            if (search) {
              search.focus()
              search.setSelectionRange(staticReportSearch.length, staticReportSearch.length)
            }
            return
          }
          if (target.matches('[data-report-editable]')) {
            staticReportEditorContent = target.innerHTML
            return
          }
          if (target.matches('[data-report-editor]')) {
            staticReportEditorContent = target.value
            return
          }
          if (target.matches('[data-report-toc-title]')) {
            reportToc = updateReportTocTree(reportToc, target.dataset.reportTocTitle, (toc) => ({
              ...toc,
              title: target.value
            }))
            return
          }
          if (!target.matches('[data-add-search]')) return
          const keyword = target.value.trim().toLowerCase()
          app.querySelectorAll('.candidate-card').forEach((card) => {
            card.hidden = keyword !== '' && !card.textContent.toLowerCase().includes(keyword)
          })
        })
        app.addEventListener('change', (event) => {
          const target = event.target
          if (target instanceof HTMLInputElement && target.matches('[data-static-task-ability]')) {
            refreshTaskDialogState(target.closest('.dialog-backdrop'))
            return
          }
          if (target instanceof HTMLSelectElement && target.matches('[data-static-ability-category]')) {
            refreshStaticAbilityEditDialog(target.closest('.dialog-backdrop'))
            return
          }
          if (target instanceof HTMLInputElement && target.matches('[data-static-ability-import-mode]')) {
            staticAbilityImportState.mode = target.value
            const dialog = target.closest('.dialog-backdrop')
            dialog?.querySelectorAll('.ability-import-mode-card').forEach((card) => {
              card.classList.toggle('active', card.querySelector('[data-static-ability-import-mode]')?.checked === true)
            })
            refreshStaticAbilityImportDialog(dialog)
            return
          }
          if (target instanceof HTMLInputElement && target.matches('[data-static-ability-file]')) {
            const file = target.files?.[0]
            if (!file) {
              staticAbilityImportState.fileName = ''
              staticAbilityImportState.abilities = []
              staticAbilityImportState.errors = []
              refreshStaticAbilityImportDialog(target.closest('.dialog-backdrop'))
              return
            }
            const job = getStaticKnownJob(staticAbilityImportState.jobId || 'job-model-deploy')
            staticAbilityImportState.fileName = file.name
            parseStaticAbilityWorkbook(file, job?.name || 'AI模型部署工程师')
              .then((result) => {
                staticAbilityImportState.abilities = result.abilities
                staticAbilityImportState.errors = result.errors
                refreshStaticAbilityImportDialog(target.closest('.dialog-backdrop'))
              })
              .catch(() => {
                staticAbilityImportState.abilities = []
                staticAbilityImportState.errors = ['模板解析失败，请确认文件格式正确后重试。']
                refreshStaticAbilityImportDialog(target.closest('.dialog-backdrop'))
              })
            return
          }
          if (!(target instanceof HTMLInputElement) || !target.matches('[data-cultivate-file]')) return
          const tip = target.closest('.cultivate-create-dialog')?.querySelector('[data-cultivate-file-tip]')
          if (!tip) return
          tip.textContent = target.files?.[0]?.name ? `已选择文件：${target.files[0].name}` : ''
          tip.hidden = !target.files?.[0]?.name
        })
        window.addEventListener('resize', () => {
          app.querySelectorAll('.graph-canvas').forEach((canvas) => {
            if (canvas.__graphLinks) updateStaticGraphLines(canvas, canvas.__graphLinks)
          })
        })
        return

        const detailHtml = `
          <main class="app-shell">
            <aside class="dock"><div class="avatar"><span></span></div><div class="dock-spacer"></div><button class="orb"><span class="new-badge">NEW</span></button><button class="dock-icon">⇩</button><button class="dock-icon small">▣</button><div class="old-link">返回旧版</div></aside>
            <section class="workspace">
              <header class="topbar"><div class="brand"><span class="ai-mark">AI</span><strong>人工智能专业</strong></div><nav class="module-nav"><button class="module-tab active"><span class="tab-icon">◎</span>岗位中心</button></nav></header>
              <div class="content-area job-content-area">
                <section class="canvas-card job-center-card">
                  <div class="detail-page">
                    <header class="detail-header"><button class="back-button" data-back>‹</button><div><h2>AI模型部署工程师</h2></div></header>
                    <div class="detail-layout">
                      <aside class="detail-tabs">
                        <h3>岗位详情</h3>
                        <button class="active" data-tab="basic">基本信息</button>
                        <button data-tab="tasks">典型工作任务</button>
                        <button data-tab="abilities">岗位能力项</button>
                        <button data-tab="map">岗位能力图谱</button>
                      </aside>
                      <section class="detail-content">
                        <div class="detail-section static-tab" data-panel="basic">
                          <div class="section-head"><h3>基本信息</h3><div class="head-actions"><button class="ai-fill-button">✦ AI补全</button><button class="secondary-action">编辑基本信息</button></div></div>
                          <div class="info-grid">
                            <div><span>岗位名称</span><strong>AI模型部署工程师</strong></div><div><span>所属职业</span><strong>人工智能工程技术人员</strong></div><div><span>职业编码</span><strong>2-02-10-09</strong></div>
                            <div><span>岗位层级</span><strong>初级 / 中级</strong></div><div><span>岗位所属产业链-产业</span><strong>人工智能产业链 - AI算法开发与部署</strong></div><div><span>岗位关联企业</span><strong>百度智能云、阿里云、科大讯飞、商汤科技</strong></div>
                            <div><span>所属岗位群</span><strong>算法部署岗位群</strong></div><div><span>薪资范围</span><strong>10K-18K</strong></div><div><span>需求等级</span><strong>高</strong></div>
                            <div><span>需求量</span><strong>18,640</strong></div><div><span>学历要求</span><strong>大专及以上</strong></div><div><span>经验要求</span><strong>1-3年</strong></div>
                          </div>
                          <div class="rich-block"><h4>职业发展路径</h4><p>模型部署工程师 → MLOps工程师 → AI平台架构师 → 智能产品技术负责人</p></div>
                          <div class="rich-block"><h4>工作内容概述</h4><p>负责将训练完成的机器学习、深度学习或大模型能力部署到生产环境，完成模型服务化、接口联调、性能监控、版本迭代和上线运维。</p></div>
                          <div class="rich-block"><h4>任职条件</h4><p>熟悉Python、Linux、模型推理服务部署、接口调试、日志排查和Docker基础，具备跨团队沟通与持续优化意识。</p></div>
                        </div>
                        <div class="detail-section static-tab" data-panel="tasks" hidden><div class="section-head"><h3>典型工作任务</h3><div class="head-actions"><button class="secondary-action">✦ AI生成</button><button class="primary-action compact" data-open-task-dialog>手动添加</button></div></div><div class="task-list">${staticTaskListHtml('job-model-deploy')}</div></div>
                        <div class="detail-section static-tab" data-panel="abilities" hidden><div class="section-head"><h3>能力项列表 <em>7</em></h3></div><table class="detail-table"><thead><tr><th>能力项名称</th><th>能力类别</th><th>能力项定义</th><th>操作</th></tr></thead><tbody><tr><td>机器学习模型推理流程</td><td>知识</td><td>理解训练、导出、推理、评估、上线的模型应用流程。</td><td><span class="link-action">编辑</span><span class="danger-action">删除</span></td></tr><tr><td>模型服务部署</td><td>技能</td><td>能够使用FastAPI、Docker等工具完成模型服务部署与调试。</td><td><span class="link-action">编辑</span><span class="danger-action">删除</span></td></tr><tr><td>跨团队协作</td><td>素养</td><td>能与算法、产品、测试和运维人员协作完成上线交付。</td><td><span class="link-action">编辑</span><span class="danger-action">删除</span></td></tr></tbody></table></div>
                        <div class="detail-section static-tab" data-panel="map" hidden><h3>岗位能力图谱</h3><div class="ability-map"><div class="map-center"><strong>AI模型部署工程师</strong><span>10K-18K</span><small>大专及以上　需求量 18,640</small></div><div class="map-tasks"><div><span>任务 1</span><strong>模型服务化方案设计</strong></div><div><span>任务 2</span><strong>模型部署与接口联调</strong></div><div><span>任务 3</span><strong>推理性能优化</strong></div><div><span>任务 4</span><strong>模型上线运维</strong></div></div><div class="ability-columns"><section><h4>知识</h4><p>机器学习模型推理流程</p><p>Linux与容器基础</p></section><section><h4>技能</h4><p>Python工程开发</p><p>模型服务部署</p></section><section><h4>素养</h4><p>数据安全与合规意识</p><p>跨团队协作</p></section></div></div></div>
                        <div class="detail-section static-tab" data-panel="suitability" hidden><div class="section-head"><h3>适岗度评价要求</h3><button class="primary-action compact">编辑</button></div><div class="suitability-layout"><div class="radar-card"><h4>岗位基准画像</h4><div class="radar-shape"><span>专业核心能力</span><span>通用工具运用</span><span>工程/业务逻辑</span><span>职业素养/软技能</span><span>行业认知与标准</span></div><p>适岗度计算综合岗位能力掌握程度、目标掌握程度与能力域权重。</p></div><div class="domain-list"><article><h4>专业核心能力</h4><span>查看关联能力项 ›</span><p>岗位基准要求 <strong>90</strong></p><p>权重 <strong>40</strong>%</p></article><article><h4>通用工具运用</h4><span>查看关联能力项 ›</span><p>岗位基准要求 <strong>85</strong></p><p>权重 <strong>20</strong>%</p></article></div></div></div>
                      </section>
                    </div>
                  </div>
                </section>
              </div>
            </section>
          </main>`

        app.addEventListener('click', (event) => {
          const target = event.target
          if (!(target instanceof Element)) return
          if (target.closest('.job-card')) {
            app.innerHTML = detailHtml
          }
          const tab = target.closest('[data-tab]')
          if (tab) {
            document.querySelectorAll('[data-tab]').forEach((item) => item.classList.toggle('active', item === tab))
            document.querySelectorAll('[data-panel]').forEach((item) => {
              item.hidden = item.getAttribute('data-panel') !== tab.getAttribute('data-tab')
            })
          }
          if (target.closest('[data-back]')) {
            window.location.reload()
          }
        })
      })()
    </script>
    <script type="module" src="/src/main.ts"></script>
  </body>
